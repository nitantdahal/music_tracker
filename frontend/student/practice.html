<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Practice Session</title>


<link rel="stylesheet" href="../assets/css/style.css">

<link rel="stylesheet" href="../assets/css/student.css">

</head>


<body>


<div class="dashboard-container">



<!-- Sidebar -->

<aside class="sidebar">


<div class="logo">

🎵 Music Tracker

</div>



<nav>


<a href="dashboard.html">

🏠 Dashboard

</a>



<a class="active">

🎸 Practice Sessions

</a>



<a>

🎯 Goals

</a>



<a>

🏆 Achievements

</a>


</nav>



<button class="logout-btn" onclick="logout()">

Logout

</button>



</aside>





<!-- Main Content -->


<main class="main-content">



<header class="topbar">


<h1>

Add Practice Session

</h1>


</header>






<section class="form-card">


<h2>

Record Your Practice

</h2>



<p id="message"></p>




<form id="practiceForm">



<div class="form-group">


<label>

Piece Name

</label>


<input 
type="text"
id="piece_name"
placeholder="Example: Moonlight Sonata"
>


</div>





<div class="form-group">


<label>

Duration (Minutes)

</label>


<input

type="number"

id="duration_minutes"

placeholder="Example: 60"

>


</div>





<div class="form-group">


<label>

Practice Date

</label>


<input

type="date"

id="session_date"

>


</div>






<div class="form-group">


<label>

Notes

</label>


<textarea

id="notes"

placeholder="Write your practice notes..."

></textarea>


</div>






<button type="submit">

Save Practice

</button>



</form>



</section>



</main>



</div>





<script src="../assets/js/checkAuth.js"></script>

<script src="../assets/js/logout.js"></script>


<script>

checkAuth("student");


</script>



</body>

</html>
